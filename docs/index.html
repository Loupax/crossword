<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreuzworträtsel-Spieler</title>
<style>
  :root {
    --primary: #007bff;
    --primary-light: #3a8fd8;
    --primary-dark: #0056b3;
    --accent: #e8a838;
    --accent-light: #f0c060;
    --success: #4caf50;
    --danger: #e74c3c;
    --danger-light: #ff6b6b;
    --bg: #f4f6f8;
    --surface: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --border: #dce1e6;
    --cell-size: clamp(28px, 5vw, 42px);
    --valid-highlight: rgba(76, 175, 80, 0.25);
    --invalid-highlight: rgba(231, 76, 60, 0.25);
    --selected-cell: #e7f1ff;
    --active-cell: #007bff;
    --text-on-primary: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }


  /* Buttons */
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-light); }

  .btn-accent {
    background: var(--accent);
    color: white;
  }
  .btn-accent:hover { background: var(--accent-light); }

  .btn-danger {
    background: var(--danger);
    color: white;
  }
  .btn-danger:hover { background: var(--danger-light); }

  .btn-success {
    background: var(--success);
    color: white;
  }
  .btn-success:hover { opacity: 0.9; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--bg); }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }


  /* Player layout */
  .player-layout {
    display: none;
    gap: 24px;
    align-items: flex-start;
  }

  .player-layout.active {
    display: flex;
  }

  .grid-panel {
    flex: 0 0 auto;
  }

  .clues-panel {
    flex: 1;
    display: flex;
    gap: 20px;
  }

  .clue-section {
    flex: 1;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 16px;
  }

  .clue-section h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--primary);
  }

  .clue-list {
    list-style: none;
  }

  .clue-list li {
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.88rem;
    transition: background 0.1s;
    line-height: 1.4;
  }

  .clue-list li:hover {
    background: var(--bg);
  }

  .clue-list li.active {
    background: var(--selected-cell);
    font-weight: 600;
  }

  .clue-number {
    font-weight: 700;
    color: var(--primary);
    margin-right: 4px;
  }

  /* Grid */
  .grid-container {
    overflow: auto;
    padding: 16px;
    text-align: center;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .grid-scroll {
    display: inline-block;
  }

  .crossword-grid {
    display: grid;
    gap: 0;
    border: 2px solid var(--primary-dark);
    user-select: none;
  }

  .grid-cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    background: var(--surface);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }

  .grid-cell.black {
    background: var(--primary-dark);
    cursor: default;
  }

  .grid-cell.letter {
    background: var(--surface);
    color: var(--primary-dark);
  }

  .grid-cell.selected {
    background: var(--selected-cell);
  }

  .grid-cell.active {
    background: var(--active-cell);
  }

  .grid-cell.correct {
    background: var(--valid-highlight);
  }

  .grid-cell.incorrect {
    background: var(--invalid-highlight);
  }

  .grid-cell .cell-number {
    position: absolute;
    top: 1px;
    left: 2px;
    font-size: 0.55rem;
    font-weight: 600;
    color: var(--text-light);
    line-height: 1;
  }

  .grid-cell .cell-letter {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--primary-dark);
  }


  /* Status / message bar */
  .status-bar {
    margin-top: 12px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-light);
    min-height: 36px;
    display: flex;
    align-items: center;
  }

  .status-bar.success {
    color: var(--success);
    border-color: var(--success);
    background: rgba(76, 175, 80, 0.08);
  }

  .status-bar.error {
    color: var(--danger);
    border-color: var(--danger);
    background: rgba(231, 76, 60, 0.08);
  }

  .puzzle-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .puzzle-info {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 12px;
  }

  /* Mobile-first base */
  .player-layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 8px;
  }
  .clues-panel {
    display: flex;
    flex-direction: column;
    width: 100%;
  }
  .clue-section {
    max-height: none;
    overflow-y: visible;
  }
  .grid-container {
    overflow-x: auto;
  }

  /* Tablet and up */
  @media (min-width: 768px) {
    .player-layout {
      flex-direction: row;
      align-items: flex-start;
      padding: 20px;
    }
    .clues-panel {
      flex: 1 1 0;
      min-width: 280px;
    }
    .clue-section {
      max-height: 80vh;
      overflow-y: auto;
    }
  }

#activeClueBox {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: var(--selected-cell);
  border: 2px solid var(--primary);
  border-radius: 6px;
  padding: 0 12px;
  margin: 8px 0;
  height: 60px;
  flex-shrink: 0;
}
#activeClueBoxText {
  flex: 1;
  font-size: 0.9rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
#prevClueBtn, #nextClueBtn {
  flex: 0 0 auto;
  background: var(--primary);
  color: var(--text-on-primary);
  border: none;
  border-radius: 4px;
  width: 36px;
  height: 36px;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#prevClueBtn:hover, #nextClueBtn:hover {
  background: var(--primary-dark);
}
#keyProxy {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 1px;
  height: 1px;
  top: -9999px;
}
</style>
</head>

<!-- Player view -->
<div class="player-layout" id="playerLayout">
  <div class="grid-panel">
    <div class="puzzle-title" id="puzzleTitle"></div>

</div>

<script>
(function () {
'use strict';

// ============================================================
// STATE
// ============================================================

let puzzle = null;        // The loaded puzzle JSON
let playerGrid = null;    // 2D array of player-entered letters ('' = empty)
let cellMap = null;       // Map<"r,c", { number, acrossClue, downClue }>
let selectedClue = null;  // { direction: 'across'|'down', index: number (into puzzle.clues array) }
let activePos = null;     // { row, col } — current cursor position
let checkActive = false;  // Whether check-solution highlights are shown

function updateActiveClueDisplays(direction, clue) {
  const boxText = document.getElementById('activeClueBoxText');
  if (boxText) {
    if (!clue) {
      boxText.textContent = 'Wähle ein Wort aus\u2026';
    } else {
      const dirLabel = direction === 'across' ? 'Waagerecht' : 'Senkrecht';
      boxText.textContent = clue.number + ' ' + dirLabel + ': ' + clue.hint;
    }
  }
}

// ============================================================
// PUZZLE LOADING
// ============================================================

async function sha256hex(message) {
  const encoded = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function init() {
  if (typeof window.__PUZZLE_DATA__ !== 'undefined') {
    const STORAGE_KEY = 'crossword-save-' + window.__PUZZLE_DATA__.salt;

    // Garbage collect stale puzzle saves
    Object.keys(localStorage)
      .filter(k => k.startsWith('crossword-save-') && k !== STORAGE_KEY)
      .forEach(k => localStorage.removeItem(k));

    // State helpers
    // Note: this player stores letters in the playerGrid 2D array (not DOM inputs).
    // saveState serializes playerGrid directly; loadState restores it and re-renders.
    function saveState() {
      if (!playerGrid) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(playerGrid));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const saved = JSON.parse(raw);
        if (!Array.isArray(saved)) return;
        for (let r = 0; r < playerGrid.length; r++) {
          if (!Array.isArray(saved[r])) continue;
          for (let c = 0; c < playerGrid[r].length; c++) {
            if (typeof saved[r][c] === 'string') {
              playerGrid[r][c] = saved[r][c];
            }
          }
        }
        renderGrid();
      } catch (e) { console.error('Failed to load corrupt state from localStorage:', e); }
    }

    loadPuzzle(window.__PUZZLE_DATA__);
    loadState();

    // Auto-save on any keydown that modifies the grid
    document.addEventListener('keydown', function(e) {
      if (!puzzle || !activePos) return;
      const key = e.key;
      if (
        (key.length === 1 && /^[a-zA-ZäöüÄÖÜß]$/.test(key)) ||
        key === 'Backspace' ||
        key === 'Delete'
      ) {
        // Save after the existing keydown handler has updated playerGrid
        setTimeout(saveState, 0);
      }
    });

    return;
  }

  // Check URL ?data= param
  const params = new URLSearchParams(window.location.search);
  const dataParam = params.get('data');
  if (dataParam) {
    try {
      let json;
      try {
        // Try base64 first (encoded as UTF-8 bytes via encodeURIComponent/btoa)
        json = decodeURIComponent(atob(dataParam).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      } catch {
        // Maybe it's URL-encoded JSON
        json = decodeURIComponent(dataParam);
      }
      const data = JSON.parse(json);
      loadPuzzle(data);
      return;
    } catch (e) {
      setStatus('Fehler beim Laden aus URL-Parameter: ' + e.message, 'error');
    }
    return;
  }

  setStatus('Kein Rätsel gefunden. Bitte eine Rätsel-URL öffnen.', 'error');
}



function loadPuzzle(data) {
  // Validate minimal structure
  if (!data.clues || !data.metadata) {
    setStatus('Ungültiges Rätselformat: "clues" und "metadata" werden benötigt.', 'error');
    return;
  }
  if (!data.clues.across || !data.clues.down) {
    setStatus('Ungültiges Rätselformat: "clues.across" und "clues.down" werden benötigt.', 'error');
    return;
  }
  if (!data.grid) {
    data = Object.assign({}, data, { grid: reconstructGridFromClues(data.clues, data.metadata) });
  }

  puzzle = data;

  // Initialize player grid
  const rows = data.metadata.gridSize.rows;
  const cols = data.metadata.gridSize.cols;
  playerGrid = [];
  for (let r = 0; r < rows; r++) {
    playerGrid.push([]);
    for (let c = 0; c < cols; c++) {
      playerGrid[r].push('');
    }
  }

  // Build cell map
  buildCellMap();

  // Switch views
  document.getElementById('playerLayout').classList.add('active');

  // Set puzzle info
  document.getElementById('puzzleTitle').textContent = data.metadata.title || 'Kreuzworträtsel';
  const wordCount = (data.clues.across.length + data.clues.down.length);
  document.getElementById('puzzleInfo').textContent =
    wordCount + ' Wörter | ' + rows + ' x ' + cols + ' Gitter';

  selectedClue = null;
  activePos = null;
  checkActive = false;

  renderGrid();
  renderClues();
  setStatus('Klicke auf eine Zelle oder einen Hinweis, um zu beginnen.');
}


// ============================================================
// CELL MAP
// ============================================================

function reconstructGridFromClues(clues, metadata) {
  const rows = metadata.gridSize.rows;
  const cols = metadata.gridSize.cols;
  const grid = Array.from({ length: rows }, () => new Array(cols).fill(''));

  for (const clue of clues.across) {
    for (let i = 0; i < clue.length; i++) {
      grid[clue.row][clue.col + i] = '*';
    }
  }
  for (const clue of clues.down) {
    for (let i = 0; i < clue.length; i++) {
      grid[clue.row + i][clue.col] = '*';
    }
  }
  return grid;
}

function buildCellMap() {
  cellMap = new Map();
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;

  // Mark all letter cells
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (puzzle.grid[r][c] !== '') {
        const key = r + ',' + c;
        if (!cellMap.has(key)) {
          cellMap.set(key, { number: null, acrossClue: null, downClue: null });
        }
      }
    }
  }

  // Map across clues to cells
  for (let i = 0; i < puzzle.clues.across.length; i++) {
    const clue = puzzle.clues.across[i];
    for (let offset = 0; offset < clue.length; offset++) {
      const key = clue.row + ',' + (clue.col + offset);
      if (cellMap.has(key)) {
        cellMap.get(key).acrossClue = i;
      }
    }
    // Set number on starting cell
    const startKey = clue.row + ',' + clue.col;
    if (cellMap.has(startKey)) {
      cellMap.get(startKey).number = clue.number;
    }
  }

  // Map down clues to cells
  for (let i = 0; i < puzzle.clues.down.length; i++) {
    const clue = puzzle.clues.down[i];
    for (let offset = 0; offset < clue.length; offset++) {
      const key = (clue.row + offset) + ',' + clue.col;
      if (cellMap.has(key)) {
        cellMap.get(key).downClue = i;
      }
    }
    // Set number on starting cell
    const startKey = clue.row + ',' + clue.col;
    if (cellMap.has(startKey)) {
      cellMap.get(startKey).number = clue.number;
    }
  }
}

// ============================================================
// RENDERING
// ============================================================

function renderGrid() {
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;
  const gridEl = document.getElementById('crosswordGrid');
  gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', var(--cell-size))';
  gridEl.style.gridTemplateRows = 'repeat(' + rows + ', var(--cell-size))';
  gridEl.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      const isLetter = puzzle.grid[r][c] !== '';
      if (!isLetter) {
        cell.classList.add('black');
      } else {
        cell.classList.add('letter');
        const key = r + ',' + c;
        const info = cellMap.get(key);

        // Number
        if (info && info.number !== null) {
          const numSpan = document.createElement('span');
          numSpan.className = 'cell-number';
          numSpan.textContent = info.number;
          cell.appendChild(numSpan);
        }

        // Player letter
        const letterSpan = document.createElement('span');
        letterSpan.className = 'cell-letter';
        letterSpan.textContent = playerGrid[r][c];
        cell.appendChild(letterSpan);

        // Highlight logic
        if (selectedClue !== null) {
          const clueData = getSelectedClueData();
          if (clueData && isCellInClue(r, c, clueData)) {
            cell.classList.add('selected');
          }
        }

        if (activePos && activePos.row === r && activePos.col === c) {
          cell.classList.remove('selected');
          cell.classList.add('active');
        }

        // Check-solution highlights
        if (checkActive && playerGrid[r][c] !== '') {
          if (playerGrid[r][c] === puzzle.grid[r][c]) {
            cell.classList.add('correct');
          } else {
            cell.classList.add('incorrect');
          }
        }

        cell.addEventListener('click', function() { onCellClick(r, c); });
      }

      gridEl.appendChild(cell);
    }
  }
}

function renderClues() {
  renderClueList('acrossClues', puzzle.clues.across, 'across');
  renderClueList('downClues', puzzle.clues.down, 'down');
}

function renderClueList(elId, clues, direction) {
  const list = document.getElementById(elId);
  list.innerHTML = '';

  for (let i = 0; i < clues.length; i++) {
    const clue = clues[i];
    const li = document.createElement('li');
    li.dataset.direction = direction;
    li.dataset.index = i;

    if (selectedClue && selectedClue.direction === direction && selectedClue.index === i) {
      li.classList.add('active');
    }

    const numSpan = document.createElement('span');
    numSpan.className = 'clue-number';
    numSpan.textContent = clue.number + '.';

    li.appendChild(numSpan);
    li.appendChild(document.createTextNode(' ' + clue.hint));

    li.addEventListener('click', function() { onClueClick(direction, i); });
    list.appendChild(li);
  }
}

// ============================================================
// INTERACTION
// ============================================================

function onCellClick(row, col) {
  const key = row + ',' + col;
  const info = cellMap.get(key);
  if (!info) return;

  checkActive = false;

  // If clicking the same cell, toggle direction
  if (activePos && activePos.row === row && activePos.col === col && selectedClue) {
    if (info.acrossClue !== null && info.downClue !== null) {
      // Toggle between across and down
      if (selectedClue.direction === 'across') {
        selectedClue = { direction: 'down', index: info.downClue };
      } else {
        selectedClue = { direction: 'across', index: info.acrossClue };
      }
      activePos = { row: row, col: col };
      updateActiveClueDisplays(selectedClue.direction, getSelectedClueData());
      renderGrid();
      const proxy = document.getElementById('keyProxy');
      if (proxy) proxy.focus();
      renderClues();
      return;
    }
  }

  // Determine which clue to select
  if (selectedClue && selectedClue.direction === 'across' && info.acrossClue !== null) {
    selectedClue = { direction: 'across', index: info.acrossClue };
  } else if (selectedClue && selectedClue.direction === 'down' && info.downClue !== null) {
    selectedClue = { direction: 'down', index: info.downClue };
  } else if (info.acrossClue !== null) {
    selectedClue = { direction: 'across', index: info.acrossClue };
  } else if (info.downClue !== null) {
    selectedClue = { direction: 'down', index: info.downClue };
  }

  activePos = { row: row, col: col };
  updateActiveClueDisplays(selectedClue ? selectedClue.direction : null, getSelectedClueData());
  renderGrid();
  const proxy = document.getElementById('keyProxy');
  if (proxy) proxy.focus();
  renderClues();
}

function onClueClick(direction, index) {
  checkActive = false;
  selectedClue = { direction: direction, index: index };
  updateActiveClueDisplays(direction, getSelectedClueData());

  // Move cursor to first empty cell in the word, or first cell
  const clueData = getSelectedClueData();
  if (clueData) {
    let placed = false;
    for (let offset = 0; offset < clueData.length; offset++) {
      const r = direction === 'across' ? clueData.row : clueData.row + offset;
      const c = direction === 'across' ? clueData.col + offset : clueData.col;
      if (playerGrid[r][c] === '') {
        activePos = { row: r, col: c };
        placed = true;
        break;
      }
    }
    if (!placed) {
      activePos = { row: clueData.row, col: clueData.col };
    }
  }

  renderGrid();
  renderClues();
}

// ============================================================
// KEYBOARD
// ============================================================

document.addEventListener('keydown', function(e) {
  if (!puzzle || !activePos) return;
  if (e.target === document.getElementById('keyProxy')) return;

  // Don't capture if focus is on an input/textarea
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const key = e.key;

  if (key.length === 1 && /^[a-zA-ZäöüÄÖÜß]$/.test(key)) {
    e.preventDefault();
    checkActive = false;
    // Handle ß -> SS (two cells) since the grid normalizes ß to SS
    const letters = key.toUpperCase();
    for (let li = 0; li < letters.length; li++) {
      playerGrid[activePos.row][activePos.col] = letters[li];
      if (li < letters.length - 1) {
        advanceCursor(1);
      }
    }
    advanceCursor(1);
    renderGrid();
    renderClues();
    checkIfComplete();
    return;
  }

  if (key === 'Backspace') {
    e.preventDefault();
    checkActive = false;
    clearCheckHighlights();
    if (playerGrid[activePos.row][activePos.col] !== '') {
      playerGrid[activePos.row][activePos.col] = '';
      renderGrid();
    } else {
      advanceCursor(-1);
      playerGrid[activePos.row][activePos.col] = '';
      renderGrid();
    }
    renderClues();
    return;
  }

  if (key === 'Delete') {
    e.preventDefault();
    checkActive = false;
    clearCheckHighlights();
    playerGrid[activePos.row][activePos.col] = '';
    renderGrid();
    return;
  }

  if (key === 'Tab') {
    e.preventDefault();
    checkActive = false;
    advanceClue(e.shiftKey ? -1 : 1);
    renderGrid();
    renderClues();
    return;
  }

  if (key === 'Enter') {
    e.preventDefault();
    checkActive = false;
    advanceClue(1);
    renderGrid();
    renderClues();
    return;
  }

  if (key === 'ArrowRight') {
    e.preventDefault();
    moveArrow(0, 1);
    return;
  }
  if (key === 'ArrowLeft') {
    e.preventDefault();
    moveArrow(0, -1);
    return;
  }
  if (key === 'ArrowDown') {
    e.preventDefault();
    moveArrow(1, 0);
    return;
  }
  if (key === 'ArrowUp') {
    e.preventDefault();
    moveArrow(-1, 0);
    return;
  }
});

// OS Keyboard Proxy — enables native mobile keyboard on cell tap
(function() {
  const proxy = document.getElementById('keyProxy');
  if (!proxy) return;

  proxy.addEventListener('input', function() {
    if (!puzzle || !activePos) { proxy.value = ''; return; }
    const val = proxy.value;
    proxy.value = '';
    if (!val) return;
    const raw = val[val.length - 1];
    if (/^[a-zA-ZäöüÄÖÜß]$/.test(raw)) {
      const letters = raw.toUpperCase(); // 'ß' -> 'SS' (2 chars), others -> 1 char
      checkActive = false;
      for (let i = 0; i < letters.length; i++) {
        playerGrid[activePos.row][activePos.col] = letters[i];
        if (i < letters.length - 1) advanceCursor(1);
      }
      advanceCursor(1);
      renderGrid();
      checkIfComplete();
      if (typeof saveState === 'function') saveState();
    }
  });

  proxy.addEventListener('keydown', function(e) {
    if (!puzzle || !activePos) return;
    if (e.key === 'Backspace') {
      e.preventDefault();
      const r = activePos.row, c = activePos.col;
      if (playerGrid[r][c] !== '') {
        playerGrid[r][c] = '';
      } else {
        advanceCursor(-1);
        playerGrid[activePos.row][activePos.col] = '';
      }
      checkActive = false; clearCheckHighlights();
      renderGrid();
      if (typeof saveState === 'function') saveState();
    } else if (e.key === 'Delete') {
      e.preventDefault();
      const r = activePos.row, c = activePos.col;
      playerGrid[r][c] = '';
      checkActive = false; clearCheckHighlights();
      renderGrid();
      if (typeof saveState === 'function') saveState();
    } else if (e.key === 'Tab') {
      e.preventDefault();
      advanceClue(e.shiftKey ? -1 : 1);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      advanceClue(1);
    } else if (e.key === 'ArrowRight') { e.preventDefault(); moveArrow(0, 1); }
      else if (e.key === 'ArrowLeft')  { e.preventDefault(); moveArrow(0, -1); }
      else if (e.key === 'ArrowDown')  { e.preventDefault(); moveArrow(1, 0); }
      else if (e.key === 'ArrowUp')    { e.preventDefault(); moveArrow(-1, 0); }
  });
})();

// Active Clue Box navigation buttons
document.getElementById('prevClueBtn').addEventListener('click', function() {
  advanceClue(-1);
  var proxy = document.getElementById('keyProxy');
  if (proxy) proxy.focus();
});
document.getElementById('nextClueBtn').addEventListener('click', function() {
  advanceClue(1);
  var proxy = document.getElementById('keyProxy');
  if (proxy) proxy.focus();
});

function advanceCursor(dir) {
  if (!selectedClue || !activePos) return;
  const clueData = getSelectedClueData();
  if (!clueData) return;

  const dr = selectedClue.direction === 'down' ? dir : 0;
  const dc = selectedClue.direction === 'across' ? dir : 0;
  const newR = activePos.row + dr;
  const newC = activePos.col + dc;

  if (isCellInClue(newR, newC, clueData)) {
    activePos = { row: newR, col: newC };
  }
}

function advanceClue(dir) {
  if (!selectedClue) {
    // Select first across clue
    if (puzzle.clues.across.length > 0) {
      onClueClick('across', 0);
    }
    return;
  }

  const allClues = [];
  for (let i = 0; i < puzzle.clues.across.length; i++) {
    allClues.push({ direction: 'across', index: i, number: puzzle.clues.across[i].number });
  }
  for (let i = 0; i < puzzle.clues.down.length; i++) {
    allClues.push({ direction: 'down', index: i, number: puzzle.clues.down[i].number });
  }
  // Sort by number for consistent ordering
  allClues.sort(function(a, b) {
    if (a.number !== b.number) return a.number - b.number;
    return a.direction === 'across' ? -1 : 1;
  });

  // Find current
  let currentIdx = allClues.findIndex(function(c) {
    return c.direction === selectedClue.direction && c.index === selectedClue.index;
  });
  if (currentIdx === -1) currentIdx = 0;

  let nextIdx = currentIdx + dir;
  if (nextIdx >= allClues.length) nextIdx = 0;
  if (nextIdx < 0) nextIdx = allClues.length - 1;

  const next = allClues[nextIdx];
  onClueClick(next.direction, next.index);
}

function moveArrow(dr, dc) {
  if (!activePos) return;
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;

  let newR = activePos.row + dr;
  let newC = activePos.col + dc;

  // Skip black cells
  while (newR >= 0 && newR < rows && newC >= 0 && newC < cols) {
    if (puzzle.grid[newR][newC] !== '') {
      activePos = { row: newR, col: newC };

      // Update selected clue if needed
      const key = newR + ',' + newC;
      const info = cellMap.get(key);
      if (info) {
        // Arrow direction hints at desired clue direction
        if ((dc !== 0) && info.acrossClue !== null) {
          selectedClue = { direction: 'across', index: info.acrossClue };
        } else if ((dr !== 0) && info.downClue !== null) {
          selectedClue = { direction: 'down', index: info.downClue };
        } else if (info.acrossClue !== null) {
          selectedClue = { direction: 'across', index: info.acrossClue };
        } else if (info.downClue !== null) {
          selectedClue = { direction: 'down', index: info.downClue };
        }
      }

      checkActive = false;
      renderGrid();
      renderClues();
      return;
    }
    newR += dr;
    newC += dc;
  }
}

// ============================================================
// HELPERS
// ============================================================

function getSelectedClueData() {
  if (!selectedClue) return null;
  const list = selectedClue.direction === 'across' ? puzzle.clues.across : puzzle.clues.down;
  return list[selectedClue.index] || null;
}

function isCellInClue(row, col, clueData) {
  if (!clueData) return false;
  const dir = selectedClue.direction;
  if (dir === 'across') {
    return row === clueData.row && col >= clueData.col && col < clueData.col + clueData.length;
  } else {
    return col === clueData.col && row >= clueData.row && row < clueData.row + clueData.length;
  }
}

function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar';
  if (type) bar.classList.add(type);
}

function extractClueAnswer(clue, direction) {
  let answer = '';
  for (let i = 0; i < clue.length; i++) {
    const r = clue.row + (direction === 'down'   ? i : 0);
    const c = clue.col + (direction === 'across' ? i : 0);
    answer += (playerGrid[r][c] || ' ').toUpperCase();
  }
  return answer;
}

// ============================================================
// CHECK / RESET
// ============================================================

function clearCheckHighlights() {
  document.querySelectorAll('.grid-cell.correct, .grid-cell.incorrect')
    .forEach(function(el) { el.classList.remove('correct', 'incorrect'); });
}

async function checkSolution() {
  if (!puzzle) return;

  if (puzzle.salt) {
    await checkSolutionHashed();
    return;
  }

  // Classic mode: cell-by-cell comparison against puzzle.grid
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;

  let allCorrect = true;
  let allFilled = true;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (puzzle.grid[r][c] !== '') {
        if (playerGrid[r][c] === '') {
          allFilled = false;
          allCorrect = false;
        } else if (playerGrid[r][c] !== puzzle.grid[r][c]) {
          allCorrect = false;
        }
      }
    }
  }

  checkActive = true;
  renderGrid();

  if (allCorrect && allFilled) {
    setStatus('Glückwunsch! Das Kreuzworträtsel ist korrekt gelöst!', 'success');
  } else if (!allFilled) {
    setStatus('Das Rätsel ist noch nicht vollständig ausgefüllt.', 'error');
  } else {
    setStatus('Einige Buchstaben sind noch nicht korrekt. Falsche Zellen sind rot markiert.', 'error');
  }
}

function checkIfComplete() {
  if (!puzzle || !playerGrid) return;
  var rows = puzzle.metadata.gridSize.rows;
  var cols = puzzle.metadata.gridSize.cols;
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      if (puzzle.grid[r][c] !== '' && playerGrid[r][c] === '') return;
    }
  }
  checkSolution();
}

async function checkSolutionHashed() {
  const salt = puzzle.salt;
  let totalClues   = 0;
  let correctClues = 0;

  for (const direction of ['across', 'down']) {
    for (const clue of puzzle.clues[direction]) {
      const userAnswer = extractClueAnswer(clue, direction);
      const userHash   = await sha256hex(salt + userAnswer);
      const isCorrect  = (userHash === clue.hash);
      totalClues++;
      if (isCorrect) correctClues++;

      for (let i = 0; i < clue.length; i++) {
        const r = clue.row + (direction === 'down'   ? i : 0);
        const c = clue.col + (direction === 'across' ? i : 0);
        const cellEl = document.querySelector(
          `.grid-cell[data-row="${r}"][data-col="${c}"]`
        );
        if (cellEl) {
          cellEl.classList.remove('correct', 'incorrect');
          if (!userAnswer.includes(' ')) {
            cellEl.classList.add(isCorrect ? 'correct' : 'incorrect');
          }
        }
      }
    }
  }

  if (correctClues === totalClues) {
    setStatus('Herzlichen Glückwunsch! Alle Wörter korrekt! 🎉', 'success');
  } else {
    setStatus(`${correctClues} von ${totalClues} Wörtern korrekt.`, 'warning');
  }
}

function resetPuzzle() {
  if (!puzzle) return;
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      playerGrid[r][c] = '';
    }
  }
  selectedClue = null;
  activePos = null;
  checkActive = false;
  renderGrid();
  renderClues();
  setStatus('Alle Eingaben wurden zurückgesetzt.');
}

// ============================================================
// INIT
// ============================================================

// Expose functions referenced by inline event handlers
window.checkSolution    = checkSolution;
window.resetPuzzle      = resetPuzzle;

init();

})();
</script>
<input id="keyProxy" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
</body>
</html>
