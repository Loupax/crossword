<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreuzworträtsel</title>
<style>
  :root {
    --primary: #1d4ed8;
    --primary-dark: #1e3a8a;
    --success: #059669;
    --danger: #dc2626;
    --bg: #f1f5f9;
    --surface: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --cell-size: 34px;
    --selected-cell: #dbeafe;
    --active-cell: #93c5fd;
    --valid-highlight: rgba(5,150,105,0.18);
    --invalid-highlight: rgba(220,38,38,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.01em;
  }

  .header-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 6px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    touch-action: manipulation;
    transition: background 0.1s;
  }
  .btn:hover { background: var(--bg); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }

  .btn-accent { background: #f59e0b; border-color: #f59e0b; color: #fff; }
  .btn-accent:hover { background: #d97706; }

  .btn-outline { background: transparent; }
  .btn-outline:hover { background: var(--bg); }

  /* LOAD SCREEN */
  .load-screen {
    max-width: 480px;
    margin: 32px auto;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .load-screen h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--primary);
  }

  .load-section { margin-bottom: 20px; }

  .load-section label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .load-section input[type="file"] {
    display: block;
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--text-muted);
  }
  .load-section input[type="file"]:hover { border-color: var(--primary); }

  .load-section textarea {
    width: 100%;
    height: 120px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: monospace;
    font-size: 0.8rem;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
  }
  .load-section textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(29,78,216,0.12);
  }

  .load-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .load-divider::before, .load-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .load-error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; display: none; }
  .load-error.visible { display: block; }

  /* PLAYER LAYOUT */
  .player-layout {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
  }
  .player-layout.active { display: flex; }

  .puzzle-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }
  .puzzle-info {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ACTIVE CLUE BAR */
  .active-clue-bar {
    display: none;
    background: var(--primary);
    color: #fff;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.9rem;
    line-height: 1.4;
  }
  .active-clue-bar.visible { display: block; }

  /* GRID */
  .grid-container {
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
  }

  .grid-scroll { display: inline-block; }

  .crossword-grid {
    display: grid;
    gap: 0;
    border: 2px solid var(--primary-dark);
    user-select: none;
  }

  .grid-cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    cursor: pointer;
    position: relative;
    touch-action: manipulation;
  }

  .grid-cell.black { background: var(--primary-dark); cursor: default; }
  .grid-cell.selected { background: var(--selected-cell); }
  .grid-cell.active { background: var(--active-cell); }
  .grid-cell.correct { background: var(--valid-highlight); }
  .grid-cell.incorrect { background: var(--invalid-highlight); }

  .cell-number {
    position: absolute;
    top: 1px;
    left: 2px;
    font-size: 0.48rem;
    font-weight: 600;
    color: var(--text-muted);
    line-height: 1;
  }

  .cell-letter {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--primary-dark);
  }

  /* TOOLBAR */
  .player-toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* STATUS BAR */
  .status-bar {
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.82rem;
    color: var(--text-muted);
    min-height: 36px;
    display: flex;
    align-items: center;
  }
  .status-bar.success { color: var(--success); border-color: var(--success); background: rgba(5,150,105,0.06); }
  .status-bar.error { color: var(--danger); border-color: var(--danger); background: rgba(220,38,38,0.06); }

  /* CLUE TABS (mobile) */
  .clues-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .clue-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    height: 44px;
    border: none;
    background: transparent;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    touch-action: manipulation;
    transition: color 0.1s, border-color 0.1s;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .clue-section { display: none; }
  .clue-section.visible { display: block; }

  .clue-section h3 {
    display: none; /* replaced by tabs */
  }

  .clue-list { list-style: none; }

  .clue-list li {
    display: flex;
    gap: 6px;
    padding: 11px 14px;
    cursor: pointer;
    font-size: 0.875rem;
    line-height: 1.4;
    border-bottom: 1px solid var(--border);
    touch-action: manipulation;
  }
  .clue-list li:last-child { border-bottom: none; }
  .clue-list li:hover { background: var(--bg); }
  .clue-list li.active { background: #eff6ff; }

  .clue-number { font-weight: 700; color: var(--primary); flex-shrink: 0; }

  /* DESKTOP */
  @media (min-width: 680px) {
    .player-layout.active {
      flex-direction: row;
      align-items: flex-start;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      gap: 20px;
    }

    .grid-panel { flex: 0 0 auto; }

    .clues-panel {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
    }

    .clue-tabs { display: none; }

    .clue-section { display: block; }
    .clue-section h3 {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
    }

    .clue-list { max-height: 38vh; overflow-y: auto; }
    .clue-section + .clue-section { border-top: 1px solid var(--border); }

    :root { --cell-size: 36px; }
  }

  @media (max-width: 479px) {
    .load-screen { margin: 16px; padding: 20px; }
    header { padding: 0 12px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Kreuzworträtsel</div>
    <div class="header-meta" id="puzzleInfo"></div>
  </div>
  <div class="header-actions" id="headerActions" style="display:none;">
    <button class="btn btn-outline" onclick="loadNewPuzzle()">Neues Rätsel</button>
  </div>
</header>

<!-- Load screen -->
<div class="load-screen" id="loadScreen">
  <h2>Rätsel laden</h2>

  <div class="load-section">
    <label for="fileInput">HTML- oder JSON-Datei</label>
    <input type="file" id="fileInput" accept=".json,.html,application/json,text/html" onchange="handleFileUpload(event)">
  </div>

  <div class="load-divider">oder</div>

  <div class="load-section">
    <label for="jsonPaste">JSON einfügen</label>
    <textarea id="jsonPaste" placeholder='{"metadata": {...}, "grid": [...], "clues": {...}}'></textarea>
    <div style="margin-top: 8px;">
      <button class="btn btn-primary" onclick="handlePaste()">Laden</button>
    </div>
  </div>

  <div class="load-error" id="loadError"></div>
</div>

<!-- Player view -->
<div class="player-layout" id="playerLayout">
  <div class="grid-panel">
    <div class="puzzle-title" id="puzzleTitle" style="margin-bottom:4px;"></div>
    <div class="active-clue-bar" id="activeClueBar"></div>
    <div class="grid-container">
      <div class="grid-scroll">
        <div class="crossword-grid" id="crosswordGrid"></div>
      </div>
    </div>
    <div class="player-toolbar" style="margin-top:10px;">
      <button class="btn btn-accent" onclick="checkSolution()">Lösung prüfen</button>
      <button class="btn btn-outline" onclick="resetPuzzle()">Zurücksetzen</button>
    </div>
    <div class="status-bar" id="statusBar" style="margin-top:8px;">Klicke auf eine Zelle oder einen Hinweis, um zu beginnen.</div>
  </div>

  <div class="clues-panel">
    <div class="clue-tabs">
      <button class="tab-btn active" id="tabAcross" onclick="showTab('across')">Waagerecht</button>
      <button class="tab-btn" id="tabDown" onclick="showTab('down')">Senkrecht</button>
    </div>
    <div class="clue-section visible" id="sectionAcross">
      <h3>Waagerecht</h3>
      <ol class="clue-list" id="acrossClues"></ol>
    </div>
    <div class="clue-section" id="sectionDown">
      <h3>Senkrecht</h3>
      <ol class="clue-list" id="downClues"></ol>
    </div>
  </div>
</div>

<!-- __PUZZLE_DATA_INJECTION__ -->
<script>
(function () {
'use strict';

// ============================================================
// STATE
// ============================================================

let puzzle = null;        // The loaded puzzle JSON
let playerGrid = null;    // 2D array of player-entered letters ('' = empty)
let cellMap = null;       // Map<"r,c", { number, acrossClue, downClue }>
let selectedClue = null;  // { direction: 'across'|'down', index: number (into puzzle.clues array) }
let activePos = null;     // { row, col } — current cursor position
let checkActive = false;  // Whether check-solution highlights are shown

// ============================================================
// PUZZLE LOADING
// ============================================================

async function sha256hex(message) {
  const encoded = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function init() {
  if (typeof window.__PUZZLE_DATA__ !== 'undefined') {
    const STORAGE_KEY = 'crossword-save-' + window.__PUZZLE_DATA__.salt;

    // Garbage collect stale puzzle saves
    Object.keys(localStorage)
      .filter(k => k.startsWith('crossword-save-') && k !== STORAGE_KEY)
      .forEach(k => localStorage.removeItem(k));

    // State helpers
    // Note: this player stores letters in the playerGrid 2D array (not DOM inputs).
    // saveState serializes playerGrid directly; loadState restores it and re-renders.
    function saveState() {
      if (!playerGrid) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(playerGrid));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const saved = JSON.parse(raw);
        if (!Array.isArray(saved)) return;
        for (let r = 0; r < playerGrid.length; r++) {
          if (!Array.isArray(saved[r])) continue;
          for (let c = 0; c < playerGrid[r].length; c++) {
            if (typeof saved[r][c] === 'string') {
              playerGrid[r][c] = saved[r][c];
            }
          }
        }
        renderGrid();
      } catch (e) { console.error('Failed to load corrupt state from localStorage:', e); }
    }

    loadPuzzle(window.__PUZZLE_DATA__);
    loadState();

    // Auto-save on any keydown that modifies the grid
    document.addEventListener('keydown', function(e) {
      if (!puzzle || !activePos) return;
      const key = e.key;
      if (
        (key.length === 1 && /^[a-zA-ZäöüÄÖÜß]$/.test(key)) ||
        key === 'Backspace' ||
        key === 'Delete'
      ) {
        // Save after the existing keydown handler has updated playerGrid
        setTimeout(saveState, 0);
      }
    });

    return;
  }

  // Check URL ?data= param
  const params = new URLSearchParams(window.location.search);
  const dataParam = params.get('data');
  if (dataParam) {
    try {
      let json;
      try {
        // Try base64 first (encoded as UTF-8 bytes via encodeURIComponent/btoa)
        json = decodeURIComponent(atob(dataParam).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      } catch {
        // Maybe it's URL-encoded JSON
        json = decodeURIComponent(dataParam);
      }
      const data = JSON.parse(json);
      loadPuzzle(data);
      return;
    } catch (e) {
      showLoadError('Fehler beim Laden aus URL-Parameter: ' + e.message);
    }
  }
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      loadPuzzle(data);
    } catch (err) {
      showLoadError('Ungültige JSON-Datei: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function handlePaste() {
  const text = document.getElementById('jsonPaste').value.trim();
  if (!text) {
    showLoadError('Bitte JSON einfügen.');
    return;
  }
  try {
    const data = JSON.parse(text);
    loadPuzzle(data);
  } catch (err) {
    showLoadError('Ungültiges JSON: ' + err.message);
  }
}

function showLoadError(msg) {
  const el = document.getElementById('loadError');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideLoadError() {
  const el = document.getElementById('loadError');
  el.textContent = '';
  el.classList.remove('visible');
}

function loadPuzzle(data) {
  // Validate minimal structure
  if (!data.clues || !data.metadata) {
    showLoadError('Ungültiges Rätselformat: "clues" und "metadata" werden benötigt.');
    return;
  }
  if (!data.clues.across || !data.clues.down) {
    showLoadError('Ungültiges Rätselformat: "clues.across" und "clues.down" werden benötigt.');
    return;
  }
  if (!data.grid) {
    data = Object.assign({}, data, { grid: reconstructGridFromClues(data.clues, data.metadata) });
  }

  puzzle = data;
  hideLoadError();

  // Initialize player grid
  const rows = data.metadata.gridSize.rows;
  const cols = data.metadata.gridSize.cols;
  playerGrid = [];
  for (let r = 0; r < rows; r++) {
    playerGrid.push([]);
    for (let c = 0; c < cols; c++) {
      playerGrid[r].push('');
    }
  }

  // Build cell map
  buildCellMap();

  // Switch views
  document.getElementById('loadScreen').style.display = 'none';
  document.getElementById('playerLayout').classList.add('active');
  document.getElementById('headerActions').style.display = 'flex';

  // Set puzzle info
  document.getElementById('puzzleTitle').textContent = data.metadata.title || 'Kreuzworträtsel';
  const wordCount = (data.clues.across.length + data.clues.down.length);
  document.getElementById('puzzleInfo').textContent =
    wordCount + ' Wörter | ' + rows + ' x ' + cols + ' Gitter';

  selectedClue = null;
  activePos = null;
  checkActive = false;

  renderGrid();
  renderClues();
  setStatus('Klicke auf eine Zelle oder einen Hinweis, um zu beginnen.');
}

function loadNewPuzzle() {
  puzzle = null;
  playerGrid = null;
  cellMap = null;
  selectedClue = null;
  activePos = null;
  checkActive = false;

  document.getElementById('loadScreen').style.display = '';
  document.getElementById('playerLayout').classList.remove('active');
  document.getElementById('headerActions').style.display = 'none';
  document.getElementById('fileInput').value = '';
  document.getElementById('jsonPaste').value = '';
  hideLoadError();
}

// ============================================================
// CELL MAP
// ============================================================

function reconstructGridFromClues(clues, metadata) {
  const rows = metadata.gridSize.rows;
  const cols = metadata.gridSize.cols;
  const grid = Array.from({ length: rows }, () => new Array(cols).fill(''));

  for (const clue of clues.across) {
    for (let i = 0; i < clue.length; i++) {
      grid[clue.row][clue.col + i] = '*';
    }
  }
  for (const clue of clues.down) {
    for (let i = 0; i < clue.length; i++) {
      grid[clue.row + i][clue.col] = '*';
    }
  }
  return grid;
}

function buildCellMap() {
  cellMap = new Map();
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;

  // Mark all letter cells
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (puzzle.grid[r][c] !== '') {
        const key = r + ',' + c;
        if (!cellMap.has(key)) {
          cellMap.set(key, { number: null, acrossClue: null, downClue: null });
        }
      }
    }
  }

  // Map across clues to cells
  for (let i = 0; i < puzzle.clues.across.length; i++) {
    const clue = puzzle.clues.across[i];
    for (let offset = 0; offset < clue.length; offset++) {
      const key = clue.row + ',' + (clue.col + offset);
      if (cellMap.has(key)) {
        cellMap.get(key).acrossClue = i;
      }
    }
    // Set number on starting cell
    const startKey = clue.row + ',' + clue.col;
    if (cellMap.has(startKey)) {
      cellMap.get(startKey).number = clue.number;
    }
  }

  // Map down clues to cells
  for (let i = 0; i < puzzle.clues.down.length; i++) {
    const clue = puzzle.clues.down[i];
    for (let offset = 0; offset < clue.length; offset++) {
      const key = (clue.row + offset) + ',' + clue.col;
      if (cellMap.has(key)) {
        cellMap.get(key).downClue = i;
      }
    }
    // Set number on starting cell
    const startKey = clue.row + ',' + clue.col;
    if (cellMap.has(startKey)) {
      cellMap.get(startKey).number = clue.number;
    }
  }
}

// ============================================================
// RENDERING
// ============================================================

function renderGrid() {
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;
  const gridEl = document.getElementById('crosswordGrid');
  gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', var(--cell-size))';
  gridEl.style.gridTemplateRows = 'repeat(' + rows + ', var(--cell-size))';
  gridEl.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      const isLetter = puzzle.grid[r][c] !== '';
      if (!isLetter) {
        cell.classList.add('black');
      } else {
        cell.classList.add('letter');
        const key = r + ',' + c;
        const info = cellMap.get(key);

        // Number
        if (info && info.number !== null) {
          const numSpan = document.createElement('span');
          numSpan.className = 'cell-number';
          numSpan.textContent = info.number;
          cell.appendChild(numSpan);
        }

        // Player letter
        const letterSpan = document.createElement('span');
        letterSpan.className = 'cell-letter';
        letterSpan.textContent = playerGrid[r][c];
        cell.appendChild(letterSpan);

        // Highlight logic
        if (selectedClue !== null) {
          const clueData = getSelectedClueData();
          if (clueData && isCellInClue(r, c, clueData)) {
            cell.classList.add('selected');
          }
        }

        if (activePos && activePos.row === r && activePos.col === c) {
          cell.classList.remove('selected');
          cell.classList.add('active');
        }

        // Check-solution highlights
        if (checkActive && playerGrid[r][c] !== '') {
          if (playerGrid[r][c] === puzzle.grid[r][c]) {
            cell.classList.add('correct');
          } else {
            cell.classList.add('incorrect');
          }
        }

        cell.addEventListener('click', function() { onCellClick(r, c); });
      }

      gridEl.appendChild(cell);
    }
  }
}

function renderClues() {
  renderClueList('acrossClues', puzzle.clues.across, 'across');
  renderClueList('downClues', puzzle.clues.down, 'down');
}

function renderClueList(elId, clues, direction) {
  const list = document.getElementById(elId);
  list.innerHTML = '';

  for (let i = 0; i < clues.length; i++) {
    const clue = clues[i];
    const li = document.createElement('li');
    li.dataset.direction = direction;
    li.dataset.index = i;

    if (selectedClue && selectedClue.direction === direction && selectedClue.index === i) {
      li.classList.add('active');
    }

    const numSpan = document.createElement('span');
    numSpan.className = 'clue-number';
    numSpan.textContent = clue.number + '.';

    li.appendChild(numSpan);
    li.appendChild(document.createTextNode(' ' + clue.hint));

    li.addEventListener('click', function() { onClueClick(direction, i); });
    list.appendChild(li);
  }
}

// ============================================================
// INTERACTION
// ============================================================

function onCellClick(row, col) {
  const key = row + ',' + col;
  const info = cellMap.get(key);
  if (!info) return;

  checkActive = false;

  // If clicking the same cell, toggle direction
  if (activePos && activePos.row === row && activePos.col === col && selectedClue) {
    if (info.acrossClue !== null && info.downClue !== null) {
      // Toggle between across and down
      if (selectedClue.direction === 'across') {
        selectedClue = { direction: 'down', index: info.downClue };
      } else {
        selectedClue = { direction: 'across', index: info.acrossClue };
      }
      activePos = { row: row, col: col };
      renderGrid();
      renderClues();
      scrollToActiveClue();
      return;
    }
  }

  // Determine which clue to select
  if (selectedClue && selectedClue.direction === 'across' && info.acrossClue !== null) {
    selectedClue = { direction: 'across', index: info.acrossClue };
  } else if (selectedClue && selectedClue.direction === 'down' && info.downClue !== null) {
    selectedClue = { direction: 'down', index: info.downClue };
  } else if (info.acrossClue !== null) {
    selectedClue = { direction: 'across', index: info.acrossClue };
  } else if (info.downClue !== null) {
    selectedClue = { direction: 'down', index: info.downClue };
  }

  activePos = { row: row, col: col };
  renderGrid();
  renderClues();
  scrollToActiveClue();
}

function onClueClick(direction, index) {
  checkActive = false;
  selectedClue = { direction: direction, index: index };

  // Move cursor to first empty cell in the word, or first cell
  const clueData = getSelectedClueData();
  if (clueData) {
    let placed = false;
    for (let offset = 0; offset < clueData.length; offset++) {
      const r = direction === 'across' ? clueData.row : clueData.row + offset;
      const c = direction === 'across' ? clueData.col + offset : clueData.col;
      if (playerGrid[r][c] === '') {
        activePos = { row: r, col: c };
        placed = true;
        break;
      }
    }
    if (!placed) {
      activePos = { row: clueData.row, col: clueData.col };
    }
  }

  renderGrid();
  renderClues();
  scrollToActiveClue();
}

function scrollToActiveClue() {
  if (!selectedClue) return;
  const listId = selectedClue.direction === 'across' ? 'acrossClues' : 'downClues';
  const list = document.getElementById(listId);
  const activeLi = list.querySelector('li.active');
  if (activeLi) {
    activeLi.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ============================================================
// KEYBOARD
// ============================================================

document.addEventListener('keydown', function(e) {
  if (!puzzle || !activePos) return;

  // Don't capture if focus is on an input/textarea
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const key = e.key;

  if (key.length === 1 && /^[a-zA-ZäöüÄÖÜß]$/.test(key)) {
    e.preventDefault();
    checkActive = false;
    // Handle ß -> SS (two cells) since the grid normalizes ß to SS
    const letters = key.toUpperCase();
    for (let li = 0; li < letters.length; li++) {
      playerGrid[activePos.row][activePos.col] = letters[li];
      if (li < letters.length - 1) {
        advanceCursor(1);
      }
    }
    advanceCursor(1);
    renderGrid();
    renderClues();
    return;
  }

  if (key === 'Backspace') {
    e.preventDefault();
    checkActive = false;
    if (playerGrid[activePos.row][activePos.col] !== '') {
      playerGrid[activePos.row][activePos.col] = '';
      renderGrid();
    } else {
      advanceCursor(-1);
      playerGrid[activePos.row][activePos.col] = '';
      renderGrid();
    }
    renderClues();
    return;
  }

  if (key === 'Delete') {
    e.preventDefault();
    checkActive = false;
    playerGrid[activePos.row][activePos.col] = '';
    renderGrid();
    return;
  }

  if (key === 'Tab') {
    e.preventDefault();
    checkActive = false;
    advanceClue(e.shiftKey ? -1 : 1);
    renderGrid();
    renderClues();
    scrollToActiveClue();
    return;
  }

  if (key === 'Enter') {
    e.preventDefault();
    checkActive = false;
    advanceClue(1);
    renderGrid();
    renderClues();
    scrollToActiveClue();
    return;
  }

  if (key === 'ArrowRight') {
    e.preventDefault();
    moveArrow(0, 1);
    return;
  }
  if (key === 'ArrowLeft') {
    e.preventDefault();
    moveArrow(0, -1);
    return;
  }
  if (key === 'ArrowDown') {
    e.preventDefault();
    moveArrow(1, 0);
    return;
  }
  if (key === 'ArrowUp') {
    e.preventDefault();
    moveArrow(-1, 0);
    return;
  }
});

function advanceCursor(dir) {
  if (!selectedClue || !activePos) return;
  const clueData = getSelectedClueData();
  if (!clueData) return;

  const dr = selectedClue.direction === 'down' ? dir : 0;
  const dc = selectedClue.direction === 'across' ? dir : 0;
  const newR = activePos.row + dr;
  const newC = activePos.col + dc;

  if (isCellInClue(newR, newC, clueData)) {
    activePos = { row: newR, col: newC };
  }
}

function advanceClue(dir) {
  if (!selectedClue) {
    // Select first across clue
    if (puzzle.clues.across.length > 0) {
      onClueClick('across', 0);
    }
    return;
  }

  const allClues = [];
  for (let i = 0; i < puzzle.clues.across.length; i++) {
    allClues.push({ direction: 'across', index: i, number: puzzle.clues.across[i].number });
  }
  for (let i = 0; i < puzzle.clues.down.length; i++) {
    allClues.push({ direction: 'down', index: i, number: puzzle.clues.down[i].number });
  }
  // Sort by number for consistent ordering
  allClues.sort(function(a, b) {
    if (a.number !== b.number) return a.number - b.number;
    return a.direction === 'across' ? -1 : 1;
  });

  // Find current
  let currentIdx = allClues.findIndex(function(c) {
    return c.direction === selectedClue.direction && c.index === selectedClue.index;
  });
  if (currentIdx === -1) currentIdx = 0;

  let nextIdx = currentIdx + dir;
  if (nextIdx >= allClues.length) nextIdx = 0;
  if (nextIdx < 0) nextIdx = allClues.length - 1;

  const next = allClues[nextIdx];
  onClueClick(next.direction, next.index);
}

function moveArrow(dr, dc) {
  if (!activePos) return;
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;

  let newR = activePos.row + dr;
  let newC = activePos.col + dc;

  // Skip black cells
  while (newR >= 0 && newR < rows && newC >= 0 && newC < cols) {
    if (puzzle.grid[newR][newC] !== '') {
      activePos = { row: newR, col: newC };

      // Update selected clue if needed
      const key = newR + ',' + newC;
      const info = cellMap.get(key);
      if (info) {
        // Arrow direction hints at desired clue direction
        if ((dc !== 0) && info.acrossClue !== null) {
          selectedClue = { direction: 'across', index: info.acrossClue };
        } else if ((dr !== 0) && info.downClue !== null) {
          selectedClue = { direction: 'down', index: info.downClue };
        } else if (info.acrossClue !== null) {
          selectedClue = { direction: 'across', index: info.acrossClue };
        } else if (info.downClue !== null) {
          selectedClue = { direction: 'down', index: info.downClue };
        }
      }

      checkActive = false;
      renderGrid();
      renderClues();
      scrollToActiveClue();
      return;
    }
    newR += dr;
    newC += dc;
  }
}

// ============================================================
// HELPERS
// ============================================================

function getSelectedClueData() {
  if (!selectedClue) return null;
  const list = selectedClue.direction === 'across' ? puzzle.clues.across : puzzle.clues.down;
  return list[selectedClue.index] || null;
}

function isCellInClue(row, col, clueData) {
  if (!clueData) return false;
  const dir = selectedClue.direction;
  if (dir === 'across') {
    return row === clueData.row && col >= clueData.col && col < clueData.col + clueData.length;
  } else {
    return col === clueData.col && row >= clueData.row && row < clueData.row + clueData.length;
  }
}

function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar';
  if (type) bar.classList.add(type);
}

function extractClueAnswer(clue, direction) {
  let answer = '';
  for (let i = 0; i < clue.length; i++) {
    const r = clue.row + (direction === 'down'   ? i : 0);
    const c = clue.col + (direction === 'across' ? i : 0);
    answer += (playerGrid[r][c] || ' ').toUpperCase();
  }
  return answer;
}

// ============================================================
// CHECK / RESET
// ============================================================

async function checkSolution() {
  if (!puzzle) return;

  if (puzzle.salt) {
    await checkSolutionHashed();
    return;
  }

  // Classic mode: cell-by-cell comparison against puzzle.grid
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;

  let allCorrect = true;
  let allFilled = true;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (puzzle.grid[r][c] !== '') {
        if (playerGrid[r][c] === '') {
          allFilled = false;
          allCorrect = false;
        } else if (playerGrid[r][c] !== puzzle.grid[r][c]) {
          allCorrect = false;
        }
      }
    }
  }

  checkActive = true;
  renderGrid();

  if (allCorrect && allFilled) {
    setStatus('Glückwunsch! Das Kreuzworträtsel ist korrekt gelöst!', 'success');
  } else if (!allFilled) {
    setStatus('Das Rätsel ist noch nicht vollständig ausgefüllt.', 'error');
  } else {
    setStatus('Einige Buchstaben sind noch nicht korrekt. Falsche Zellen sind rot markiert.', 'error');
  }
}

async function checkSolutionHashed() {
  const salt = puzzle.salt;
  let totalClues   = 0;
  let correctClues = 0;

  for (const direction of ['across', 'down']) {
    for (const clue of puzzle.clues[direction]) {
      const userAnswer = extractClueAnswer(clue, direction);
      const userHash   = await sha256hex(salt + userAnswer);
      const isCorrect  = (userHash === clue.hash);
      totalClues++;
      if (isCorrect) correctClues++;

      for (let i = 0; i < clue.length; i++) {
        const r = clue.row + (direction === 'down'   ? i : 0);
        const c = clue.col + (direction === 'across' ? i : 0);
        const cellEl = document.querySelector(
          `.grid-cell[data-row="${r}"][data-col="${c}"]`
        );
        if (cellEl) {
          cellEl.classList.remove('correct', 'incorrect');
          if (!userAnswer.includes(' ')) {
            cellEl.classList.add(isCorrect ? 'correct' : 'incorrect');
          }
        }
      }
    }
  }

  if (correctClues === totalClues) {
    setStatus('Herzlichen Glückwunsch! Alle Wörter korrekt! 🎉', 'success');
  } else {
    setStatus(`${correctClues} von ${totalClues} Wörtern korrekt.`, 'warning');
  }
}

function resetPuzzle() {
  if (!puzzle) return;
  const rows = puzzle.metadata.gridSize.rows;
  const cols = puzzle.metadata.gridSize.cols;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      playerGrid[r][c] = '';
    }
  }
  selectedClue = null;
  activePos = null;
  checkActive = false;
  renderGrid();
  renderClues();
  setStatus('Alle Eingaben wurden zurückgesetzt.');
}

// ============================================================
// INIT
// ============================================================

// ============================================================
// TAB SWITCHING (mobile clue panel)
// ============================================================

function showTab(direction) {
  const isAcross = direction === 'across';
  document.getElementById('tabAcross').classList.toggle('active', isAcross);
  document.getElementById('tabDown').classList.toggle('active', !isAcross);
  document.getElementById('sectionAcross').classList.toggle('visible', isAcross);
  document.getElementById('sectionDown').classList.toggle('visible', !isAcross);
}

// ============================================================
// ACTIVE CLUE BAR
// ============================================================

function updateActiveClueBar() {
  const bar = document.getElementById('activeClueBar');
  if (!bar) return;
  if (!selectedClue) { bar.classList.remove('visible'); return; }
  const clue = getSelectedClueData();
  if (!clue) { bar.classList.remove('visible'); return; }
  const dir = selectedClue.direction === 'across' ? 'Waagerecht' : 'Senkrecht';
  bar.textContent = clue.number + ' ' + dir + ': ' + clue.hint;
  bar.classList.add('visible');
}

// ============================================================
// PATCH scrollToActiveClue to auto-switch tabs + update bar
// ============================================================

const _origScrollToActiveClue = scrollToActiveClue;
scrollToActiveClue = function() {
  if (selectedClue) showTab(selectedClue.direction);
  updateActiveClueBar();
  _origScrollToActiveClue();
};

// Expose functions referenced by inline event handlers
window.checkSolution    = checkSolution;
window.resetPuzzle      = resetPuzzle;
window.loadNewPuzzle    = loadNewPuzzle;
window.handleFileUpload = handleFileUpload;
window.handlePaste      = handlePaste;
window.showTab          = showTab;

init();

})();
</script>
